<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Букмарклеты</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: rgba(255,255,255,.06);
      --card-hover: rgba(255,255,255,.11);
      --border: rgba(255,255,255,.12);
      --text: #fff;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1115;
      color: #fff;
    }
    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .grid {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 24px;
    }
    .card {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-decoration: none;
      color: inherit;
      font-size: clamp(54px, 9vw, 88px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      transition: transform .18s ease, background-color .18s ease, border-color .18s ease, box-shadow .18s ease;
      cursor: grab;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: var(--card-hover);
      border-color: rgba(255,255,255,.22);
      box-shadow: 0 28px 70px rgba(0,0,0,.42);
    }
    .card:active { cursor: grabbing; }

    @media (max-width: 820px) {
      .grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="grid">
      <a class="card" id="cleanup" href="#" draggable="true">🧹</a>
      <a class="card" id="widget" href="#" draggable="true">📟</a>

      <a class="card" id="plan" href="#" draggable="true">📅</a>
      <a class="card" id="publish" href="#" draggable="true">🚀</a>
      <a class="card" id="login" href="#" draggable="true">🔐</a>
    </section>
  </main>
