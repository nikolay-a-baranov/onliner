<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Букмарклеты</title>
  <link rel="icon" href="../favicon.ico">
  <style>
    :root {
      --bg: #0f1115;
      --card: rgba(255,255,255,.06);
      --card-hover: rgba(255,255,255,.11);
      --border: rgba(255,255,255,.12);
      --text: #fff;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1115;
      color: var(--text);
    }
    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .grid {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 24px;
    }
    .card {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-decoration: none;
      color: inherit;
      font-size: clamp(54px, 9vw, 88px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      transition: transform .18s ease, background-color .18s ease, border-color .18s ease, box-shadow .18s ease;
      cursor: grab;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: var(--card-hover);
      border-color: rgba(255,255,255,.22);
      box-shadow: 0 28px 70px rgba(0,0,0,.42);
    }
    .card:active { cursor: grabbing; }
    .card:focus-visible {
      outline: 2px solid rgba(255,255,255,.8);
      outline-offset: 4px;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .card { min-height: 180px; }
    }
    @media (max-width: 520px) {
      main { padding: 18px; }
      .grid { grid-template-columns: 1fr; gap: 18px; }
      .card { min-height: 140px; border-radius: 22px; }
    }
  </style>
</head>

  <script>
  const bookmarkletCode = card => {
    let code = card.getAttribute('href') || '';
    if (!code.startsWith('javascript:')) return '';
    const prefix = 'javascript:';
    let body = code.slice(prefix.length);
    try {
      body = decodeURIComponent(body);
    } catch {
      body = body.replace(/%([0-9a-f]{2})/gi, (_, hex) =>
        String.fromCharCode(parseInt(hex, 16))
      );
    }
    return prefix + body;
  };
  const copy = async text => {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      const area = document.createElement('textarea');
      area.value = text;
      area.style.position = 'fixed';
      area.style.left = '-9999px';
      area.style.top = '0';
      document.body.appendChild(area);
      area.focus();
      area.select();
      area.setSelectionRange(0, area.value.length);
      const ok = document.execCommand('copy');
      area.remove();
      return ok;
    }
  };
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', async event => {
      event.preventDefault();
      const code = bookmarkletCode(card);
      if (!code) return;
      const ok = await copy(code);
      const prev = card.textContent;
      card.textContent = ok ? '✅' : '❌';
      setTimeout(() => {
        card.textContent = prev;
      }, 700);
    });
  });
</script>
